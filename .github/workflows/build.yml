name: Build Windows Kiosk

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore ApacKiosk/ApacKiosk.csproj

      - name: Build
        run: dotnet build ApacKiosk/ApacKiosk.csproj --configuration Release --no-restore

      - name: Publish (self-contained)
        run: >
          dotnet publish ApacKiosk/ApacKiosk.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ApacKiosk-win-x64
          path: ./publish/
