<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Bloqueado</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #0f0f23;
  color: #e0e0e0;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; text-align: center;
}
.container { max-width: 600px; padding: 40px; }
.logo { font-size: 48px; font-weight: 800; color: #7c3aed; margin-bottom: 20px; letter-spacing: 4px; }
.lock-icon { font-size: 80px; margin-bottom: 20px; }
h1 { font-size: 24px; font-weight: 600; margin-bottom: 16px; color: #a78bfa; }
p { font-size: 16px; line-height: 1.6; margin-bottom: 12px; color: #9ca3af; }
.message { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; padding: 20px; margin: 20px 0; }
.message p { color: #e0e0e0; font-size: 15px; }
.contact { font-size: 13px; color: #6b7280; margin-top: 30px; }
.blocked-url { font-family: 'Consolas', monospace; font-size: 13px; color: #7c3aed; word-break: break-all; background: rgba(124,58,237,0.1); padding: 4px 10px; border-radius: 4px; margin-top: 16px; display: inline-block; }
</style>
</head>
<body>
<div class="container">
  <div class="lock-icon">🔒</div>
  <div class="logo">APAC</div>
  <h1>Acesso Bloqueado</h1>
  <div class="message">
    <p>Este site não está disponível.</p>
    <p>Entre em contato com o administrador.</p>
  </div>
  <p class="contact">Sistema de Acesso Digital — APAC</p>
</div>
</body>
</html>
