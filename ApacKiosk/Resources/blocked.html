<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f4f4;display:flex;justify-content:center;align-items:center;height:100vh;text-align:center}
.container{background:white;padding:60px 80px;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.1);max-width:600px}
.icon{font-size:64px;margin-bottom:20px;display:block}
h1{color:#c0392b;font-size:28px;margin-bottom:16px}
p{color:#555;font-size:16px;line-height:1.6;margin-bottom:8px}
.domain{font-weight:bold;color:#333;background:#fff3cd;padding:4px 12px;border-radius:4px;display:inline-block;margin:8px 0}
.logo{margin-top:40px;font-size:14px;color:#999}
</style>
</head>
<body>
<div class="container">
<span class="icon">&#128274;</span>
<h1>Acesso Bloqueado</h1>
<p>Este site n&atilde;o est&aacute; dispon&iacute;vel.</p>
<p>Entre em contato com o administrador.</p>
<p><span class="domain" id="domain"></span></p>
<div class="logo">APAC &mdash; Acesso Controlado</div>
</div>
<script>
document.getElementById('domain').textContent = window.location.href;
</script>
</body>
</html>
