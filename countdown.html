<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contagem Regressiva — Ano Novo</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 40%, #0f2027 100%);
    color: #e0e0e0;
  }

  .container {
    text-align: center;
    padding: 3rem 2rem;
    background: rgba(255,255,255,0.04);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    max-width: 720px;
    width: 90%;
  }

  h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #a0c4ff;
    margin-bottom: 0.5rem;
  }

  h2 {
    font-size: 4.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #ffd700, #ffb703);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 2rem;
  }

  .countdown {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 1.5rem 1rem;
    min-width: 120px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }

  .card .number {
    font-size: 3.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(180deg, #ffffff 0%, #b0c4de 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .card .label {
    font-size: 0.8rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: #7a8ba6;
    margin-top: 0.4rem;
  }

  .year {
    font-size: 1.1rem;
    color: #5a6d84;
    margin-top: 2rem;
    letter-spacing: 0.1em;
  }

  .finished {
    display: none;
  }

  .finished h2 {
    font-size: 3rem;
    -webkit-text-fill-color: #ffd700;
  }

  @media (max-width: 560px) {
    h1 { font-size: 1.2rem; }
    .card { min-width: 70px; padding: 1rem 0.6rem; }
    .card .number { font-size: 2.2rem; }
    .card .label { font-size: 0.65rem; }
  }
</style>
</head>
<body>

<div class="container" id="countdownView">
  <h1>Contagem Regressiva</h1>
  <h2>Ano Novo</h2>
  <div class="countdown">
    <div class="card"><div class="number" id="days">00</div><div class="label">Dias</div></div>
    <div class="card"><div class="number" id="hours">00</div><div class="label">Horas</div></div>
    <div class="card"><div class="number" id="minutes">00</div><div class="label">Minutos</div></div>
    <div class="card"><div class="number" id="seconds">00</div><div class="label">Segundos</div></div>
  </div>
  <div class="year" id="targetYear"></div>
</div>

<div class="container finished" id="finishedView">
  <h1>Feliz</h1>
  <h2>Ano Novo!</h2>
  <div class="year" id="finishedYear"></div>
</div>

<script>
  function pad(n) {
    return String(n).padStart(2, '0');
  }

  function update() {
    var now = new Date();
    var year = now.getFullYear();
    var target = new Date(year, 11, 31, 23, 59, 59);

    if (now > target) {
      // Already past Dec 31 of this year — show finished screen with next year
      document.getElementById('countdownView').style.display = 'none';
      var fv = document.getElementById('finishedView');
      fv.style.display = 'block';
      document.getElementById('finishedYear').textContent = year + 1;
      return;
    }

    var diff = target - now;
    var d = Math.floor(diff / (1000 * 60 * 60 * 24));
    var h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    var s = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('days').textContent = pad(d);
    document.getElementById('hours').textContent = pad(h);
    document.getElementById('minutes').textContent = pad(m);
    document.getElementById('seconds').textContent = pad(s);
    document.getElementById('targetYear').textContent = '31 de Dezembro de ' + year;
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
